<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>இரண்டாயிரம் ஆண்டுகள் இளமை — Tamil E-Magazine</title>
    <meta name="description" content="A Tamil cultural e-magazine with realistic flip-book reading experience">
    <meta property="og:title" content="இரண்டாயிரம் ஆண்டுகள் இளமை">
    <meta property="og:description" content="A Tamil cultural e-magazine">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header class="site-header">
        <div class="container">
            <h1 class="magazine-title">இரண்டாயிரம் ஆண்டுகள் இளமை</h1>
            <p class="magazine-tagline">தமிழ் பண்பாட்டு மின்-இதழ்</p>
            <nav class="header-nav">
                <a href="index.html">முகப்பு</a>
                <a href="#issues">எல்லா இதழ்களும்</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <!-- Featured Issue -->
        <section id="featured-section" class="featured-section" aria-label="சிறப்பு இதழ்">
            <!-- Skeleton shown while loading -->
            <div class="skeleton-featured">
                <div class="skeleton-image"></div>
                <div class="skeleton-body" style="flex:1; padding:1.5rem;">
                    <div class="skeleton-line short"></div>
                    <div class="skeleton-line medium"></div>
                    <div class="skeleton-line"></div>
                    <div class="skeleton-line short"></div>
                </div>
            </div>
        </section>

        <!-- Search & Filter -->
        <section class="search-section">
            <input type="search" id="search-input" class="search-input" placeholder="இதழ் தேடுங்கள்..." aria-label="இதழ் தேடுங்கள்">
            <div class="lang-toggle" role="group" aria-label="Language">
                <button class="active" data-lang="ta">தமிழ்</button>
                <button data-lang="en">EN</button>
            </div>
        </section>

        <!-- All Issues -->
        <section id="issues" class="issues-section">
            <h2 class="section-title">எல்லா இதழ்களும்</h2>
            <div id="issues-grid" class="issues-grid">
                <!-- Skeleton cards while loading -->
                <div class="skeleton-card">
                    <div class="skeleton-image"></div>
                    <div class="skeleton-body">
                        <div class="skeleton-line medium"></div>
                        <div class="skeleton-line short"></div>
                    </div>
                </div>
                <div class="skeleton-card">
                    <div class="skeleton-image"></div>
                    <div class="skeleton-body">
                        <div class="skeleton-line medium"></div>
                        <div class="skeleton-line short"></div>
                    </div>
                </div>
                <div class="skeleton-card">
                    <div class="skeleton-image"></div>
                    <div class="skeleton-body">
                        <div class="skeleton-line medium"></div>
                        <div class="skeleton-line short"></div>
                    </div>
                </div>
            </div>
            <div id="error-message" class="error-message" hidden>
                <p>இதழ்களை ஏற்ற இயலவில்லை. மீண்டும் முயற்சிக்கவும்.</p>
                <button class="btn btn-secondary" onclick="location.reload()" style="margin-top:1rem;">மீண்டும் முயற்சி</button>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 இரண்டாயிரம் ஆண்டுகள் இளமை. அனைத்து உரிமைகளும் பாதுகாக்கப்பட்டவை.</p>
        </div>
    </footer>

    <script src="assets/js/home.js"></script>
</body>
</html>
