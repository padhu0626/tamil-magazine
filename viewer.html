<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>இதழ் படிக்க — இரண்டாயிரம் ஆண்டுகள் இளமை</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Tamil:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="viewer-body">
    <header class="viewer-header">
        <div class="viewer-header-inner">
            <a href="index.html" class="back-button" aria-label="முகப்புக்குத் திரும்பு">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="15 18 9 12 15 6"></polyline>
                </svg>
                <span>முகப்பு</span>
            </a>
            <h1 id="viewer-title" class="viewer-title">ஏற்றப்படுகிறது...</h1>
            <div class="viewer-actions">
                <a id="download-btn" href="#" class="btn btn-small" download aria-label="பதிவிறக்கம்">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                </a>
                <button id="fullscreen-btn" class="btn btn-small" aria-label="முழுத்திரை">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <polyline points="9 21 3 21 3 15"></polyline>
                        <line x1="21" y1="3" x2="14" y2="10"></line>
                        <line x1="3" y1="21" x2="10" y2="14"></line>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="viewer-main">
        <div id="flipbook-container" class="flipbook-container">
            <!-- StPageFlip renders here -->
        </div>

        <div id="viewer-loading" class="viewer-loading">
            <div class="spinner"></div>
            <p id="loading-text">இதழ் ஏற்றப்படுகிறது...</p>
            <div id="loading-progress" class="loading-progress">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
        </div>

        <div id="viewer-error" class="viewer-error" hidden>
            <p id="error-text">இதழை ஏற்ற இயலவில்லை.</p>
            <a href="index.html" class="btn">முகப்புக்குத் திரும்பு</a>
        </div>
    </main>

    <footer class="viewer-controls">
        <button id="prev-btn" class="btn btn-nav" aria-label="முந்தைய பக்கம்" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"></polyline>
            </svg>
        </button>
        <span id="page-indicator" class="page-indicator">— / —</span>
        <button id="next-btn" class="btn btn-nav" aria-label="அடுத்த பக்கம்" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"></polyline>
            </svg>
        </button>
    </footer>

    <script src="assets/js/lib/pdf.min.js"></script>
    <script src="assets/js/lib/page-flip.browser.js"></script>
    <script src="assets/js/viewer.js"></script>
</body>
</html>
